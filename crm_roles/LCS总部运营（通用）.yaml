roles:
  LCS总部运营（通用）:
    display_name: LCS总部运营（通用角色）
    description: 总部运营通用权限配置

    systems:

      CRM系统:
        功能权限:
          菜单权限:
            菜单-会员管理:
              enabled: yes
              子菜单:
                菜单-会员列表:
                  enabled: yes
                  功能限制:
                    查看: yes
                    创建及草稿编辑: no
                    导出: no
                    人工调整积分: no
                    查看TAB-会员基本信息: yes
                    查看TAB-会员入会/绑定信息: yes
                    查看TAB-邀请人信息: yes
                    查看TAB-会员权益-积分明细: yes
                    查看TAB-会员权益-券明细: yes
                    查看TAB-会员等级: yes
                    查看TAB-交易历史: yes
                    查看TAB-黑名单历史: yes
                    查看TAB-其他: no
                    查看TAB-互动历史: yes
                    解绑手机号: no
                    抖音会员合并操作: no
                    抖音会员合并记录查看: no
                  字段设置: {}
            菜单-客户数据报表:
              enabled: yes
              子菜单:
                菜单-数据概览: yes
                菜单-销售明细: yes
                菜单-会员表现: yes
                菜单-会员忠诚项目: yes
                菜单-企微私域运营: yes
                菜单-营销活动成效: yes
                菜单-沟通成效: yes
            菜单-预约管理:
              enabled: yes
              子菜单:
                菜单-场次管理: yes
                菜单-预约单: yes
                菜单-黑名单管理: no
        数据权限:
          会员管理:
            会员范围: 归属在本组织及下属组织的会员数据
            交易历史: 归属在本组织及下属组织的会员数据
            会员权益-券明细: 归属在本组织及下属组织的会员数据
            会员权益-积分明细: 归属在本组织及下属组织的会员数据
            互动历史: 归属在本组织及下属组织的会员数据
            权益渠道: 归属在本组织及下属组织的权益数据

      微信小程序-预约管理:
        功能权限:
          模块权限:
            预约管理:
              enabled: yes
              子模块:
                场次管理:
                  enabled: yes
                  功能限制:
                    活动预约场次管理: yes
                    产品预约场次操作: yes
                    产品预约场次查看: yes
                    工作坊场次管理: yes
                预约单管理:
                  enabled: yes
                  功能限制:
                    活动/产品预约单: yes
                    工作坊预约单: yes
                黑名单管理:
                  enabled: no
                  功能限制:
                    黑名单查看: no
                    取消黑名单: no
            核销小程序:
              enabled: yes
            核销小程序-工作坊:
              enabled: no
        数据权限:
          会员管理:
            预约单及黑名单信息: 归属在本组织及下属组织的会员数据
          会员数据范围:
            预约单信息: yes
            黑名单信息: no
          敏感字段:
            预约单信息:
              enabled: yes
              字段:
                联系人姓名: yes
                联系人手机号: yes
                会员手机号: yes

      tableau:
        功能权限:
          模块权限:
            客户数据报表:
              enabled: yes
              子模块:
                数据概览:
                  enabled: yes
                  功能限制:
                    查看详情&列表: yes
                销售明细:
                  enabled: yes
                  功能限制:
                    查看详情&列表: yes
                会员表现:
                  enabled: yes
                  功能限制:
                    查看详情&列表: yes
                会员忠诚项目:
                  enabled: yes
                  功能限制:
                    查看详情&列表: yes
                企微私域运营:
                  enabled: yes
                  功能限制:
                    查看详情&列表: yes
                营销活动成效:
                  enabled: yes
                  功能限制:
                    查看详情&列表: yes
                沟通成效:
                  enabled: yes
                  功能限制:
                    查看详情&列表: yes
        数据权限:
          客户数据报表:
            客户数据报表: 归属在本组织及下属组织的会员数据

      手机报表: no
      CDP: no
      微信小程序-活动运营: no
      PID: no
      CCMD: no
      精选内容: no
      创意管理: no
      补件物流管理: no