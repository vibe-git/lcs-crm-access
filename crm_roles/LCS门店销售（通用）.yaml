roles:
  LCS门店销售（通用）:
    display_name: LCS门店销售（通用角色）
    description: 门店销售通用权限配置

    systems:
      CRM系统:
        功能权限:
          菜单权限:

            # ==================== 菜单-会员管理 ====================
            菜单-会员管理:
              enabled: yes
              子菜单:
                菜单-会员列表:
                  enabled: yes
                  功能限制:
                    查看: yes
                    创建及草稿编辑: no
                    导出: no
                    人工调整积分: no
                    查看TAB-会员基本信息: yes
                    查看TAB-会员入会/绑定信息: yes
                    查看TAB-邀请人信息: yes
                    查看TAB-会员权益-积分明细: yes
                    查看TAB-会员权益-券明细: yes
                    查看TAB-会员等级: yes
                    查看TAB-交易历史: yes
                    查看TAB-黑名单历史: yes
                    查看TAB-其他: no
                    查看TAB-互动历史: yes
                    解绑手机号: no
                    抖音会员合并操作: no
                    抖音会员合并记录查看: no
                  字段设置: {}   # 待补充具体字段清单

            # ==================== 菜单-客户数据报表 ====================
            # 注: 父菜单为半选状态, enabled 按 "至少有一个子菜单勾选" 的语义填 yes
            菜单-客户数据报表:
              enabled: yes
              子菜单:
                菜单-数据概览: yes
                菜单-销售明细: yes
                菜单-会员表现: yes
                菜单-会员忠诚项目: no
                菜单-企微私域运营: no
                菜单-营销活动成效: no
                菜单-沟通成效: no

            # ==================== 菜单-预约管理 ====================
            # 注: 父菜单为半选状态 (只勾了预约单)
            菜单-预约管理:
              enabled: yes
              子菜单:
                菜单-场次管理: no
                菜单-预约单: yes
                菜单-黑名单管理: no