roles:
  营销触达_LCS:
    display_name: 营销触达_LCS
    description: 营销触达 LCS 角色权限配置

    systems:

      CRM系统:
        功能权限:
          菜单权限:
            菜单-忠诚度管理:
              enabled: yes
              子菜单:
                菜单-积分规则:
                  enabled: no
                  功能限制:
                    查看TAB-积分规则: no
                    查看TAB-不积分规则: no
                    创建及草稿编辑-积分规则: no
                    创建及草稿编辑-不积分规则: no
                    审核通过-积分规则: no
                    审核通过-不积分规则: no
                    删除-积分规则: no
                    删除-不积分规则: no
                    停用-积分规则: no
                    停用-不积分规则: no
                菜单-券规则:
                  enabled: yes
                  功能限制:
                    查看: yes
                    创建及草稿编辑: yes
                    非草稿状态编辑: yes
                    审核通过: yes
                    删除: yes
                    停用/下架/禁用: yes
                    紧急失效: yes
                菜单-等级规则管理:
                  enabled: no
                  功能限制:
                    查看: no
                    非草稿状态编辑: no
                菜单-权益规则管理:
                  enabled: no
                  功能限制:
                    查看: no
                    创建及草稿编辑: no
                    非草稿状态编辑: no
                    审核通过: no
                    删除: no
                    停用/下架/禁用: no
                菜单-营销触达:
                  enabled: yes
                  功能限制:
                    创建及查看发券任务: yes
                    创建及查看积分任务: no
                菜单-乐高乐园营销管理:
                  enabled: no
                  功能限制:
                    GPA: no
                    LCS: no
                    INSIDERS: no
        数据权限:
          会员管理:
            会员范围: 归属在本组织及下属组织的会员数据
            交易历史: 归属在本组织及下属组织的会员数据
            会员权益-券明细: 归属在本组织及下属组织的会员数据
            会员权益-积分明细: 归属在本组织及下属组织的会员数据
            互动历史: 归属在本组织及下属组织的会员数据
            权益渠道: 归属在本组织及下属组织的权益数据

      微信小程序-预约管理: no
      tableau: no
      手机报表: no
      CDP: no
      微信小程序-活动运营: no
      PID: no
      CCMD: no
      精选内容: no
      创意管理: no
      补件物流管理: no